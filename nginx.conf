server {
    listen 80;
    server_name qbombomararipe.com.br www.qbombomararipe.com.br;

    root /home/marquin/var/www/qbombom/client/dist;
    index index.html;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://pub-e67bdad038be4936ae8529d4715262d3.r2.dev; connect-src 'self' http://api.qbombomararipe.com.br ws://api.qbombomararipe.com.br;" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/qbombom-client-access.log;
    error_log  /var/log/nginx/qbombom-client-error.log;
}

server {
    listen 80;
    server_name api.qbombomararipe.com.br;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/qbombom-api-access.log;
    error_log  /var/log/nginx/qbombom-api-error.log;
}
